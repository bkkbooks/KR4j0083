body:
  text: 渚山堂詞話卷三明陳霆撰卓津登徐仙亭云流水小灣西晚坐孤亭靜不見髙人跨鶴歸風水搖清影古往與今來休用重重省十里梅花雪正晴月浸遙山冷全篇殊有仙氣曩見吕洞賓題一闋于鳳停橋云落日數聲啼鳥香風滿路飛花道人留我煮新茶洗蕩胸中瀟灑世事不堪回首夢魂猶繞天涯鳳停橋畔即吾家管甚月明今夜蓋西江月腔也味其中無一㸃煙火氣卓詞近之髙季迪寒夜曲云蕙火紅銷金鼎鴉樹不驚風靜多事月明來照出小忩孤影宵永宵永人與梅花俱冷誠亦可誦季迪號稱姑蘇才子與楊孟載輩齊名他詩文未論獨於詞曲楊所賦類清便綺麗頗近唐宋風致而髙於此殊為不及豈非人之才情各有獨得之妙耶髙詞豫所選數首外遺珠剩玉蓋不多見乃知詞令雖小道至論髙處亦未易易耳詩有集古句者矣而南詞則少見用此格者偶於半山集得一闋焉菩薩蠻云數間茆屋閒臨水窄衫短帽垂楊裏花是去年紅吹開一夜風梢梢新月偃午醉醒來晚何許最關情黃鸝三兩聲荆公退居金陵作草堂於半山之麓引入功德水濬小巷於其上壘石作橋暇則幅巾藜杖往來其間因集古句為此俾侍者歌之京師崇文門外有祠曰三忠都人建以祀漢諸葛忠武宋嶽武穆文文山士大夫南行者多餞别於此所以作勤瘁而勵忠節於夫世教不謂無補憶豫曩嵗試政刑部一日在廣坐吏以冊葉置案上豫取閲之乃三忠詩也凡若干首獨喜范主事淵一絶云萬古綱常惟一事兩朝人物屬三公誰修古廟燕山道樹色江聲落照中詞簡而意盡且有關係有感慨他詩莫能及也豫亦有詞寄酹江月全篇云乾坤易老歎風塵飄蕩河山分裂名分綱常都掃地曾有何人提挈身翊飛龍氣吞胡馬赤手扶天闕精忠照耀一時名並日月須信天理人心自來不泯千載思遺烈廟貌燕山崇祀典華表三忠新揭西北中原東南王氣回首驚風雪傷心行路不堪日暮時節周清真渡江雲首云晴嵐低楚甸暖回鴈翅陳勢起平沙繼云千萬絲陌頭楊栁漸漸可藏鴉今以景物而觀暖初回鴈栁漸藏鴉則仲春候也後乃云今朝正對初弦月傍水驛深艤蒹葭又似夏秋之際容非語病乎謂若稍更句中云今宵正對江心月憶年時水宿蒹葭庶映帶過無礙也劉改之沁園春云緑鬢朱顔玊帶金魚神仙畫圖把擎天柱石空留緑野濟川舟楫閒艤西湖天欲安劉公歸重趙許大功勳誰得如平章看道人如孔孟世似唐虞不須别作規模但收拾人才多用儒况自昔軍中膽能寒虜如今胸次氣欲吞胡紫府真人黑頭元宰收斂神功寂若無歸來好正芝香棗熟鶴瘦松癯此詞題云代夀韓平原然在當時不知竟代誰作改之與康伯可俱渡江後詩人康以詞受知秦檜致位通顯而改之竟流落布衣以死人之幸不幸又何也然改之詞意雖媚其收拾用儒收斂若無與芝香棗熟等句猶有勸托胄謙冲下賢及功成身退之意若康之夀檜云願歲嵗見栁梢青淺梅英紅小則迎導其怙寵固位志則陋矣劉伯溫春怨蓋感嘆時事也末云無計網斜暉謾遮得愁人望眼登髙凝睇欲寄一封書鴻路阻豹關深日暮空腸斷觀豹關深之句知元季兵起賢者感時傷事非不欲獻言於上以銷禍亂而九重阻深無路自達徒登髙悵望而巳回首呌虞舜蒼梧雲正愁所謂日暮腸斷之意類如此宋二帝北狩金人徙之雲州一日夜宿林下時磧月微明有胡雛吹笛其聲嗚咽太上因口占眼兒媚云玉京曾記舊繁華萬里帝王家瓊林玉殿朝喧簫管暮列琵琶花城人去今蕭索春夢繞龍沙家山何處忍聽羌笛徹梅花此詞少帝有和篇意更凄愴不欲並載吾謂其父子至此雖噬臍無及矣每一披閲為酸鼻焉元人楊某之齊安教鄧中齊作摸魚兒送之後闋有云臨皋一枕三生夢還認岷峨鄉語蓋及東坡謫居黃州其遊赤壁之夜所遇道士化鶴事也豫謂岷峨鄉語雖暗用天寶中青城道士化鶴於沙苑故事但謂岷峨則語意頗晦不若直云青城鄉語庶一覽可見也因特更云臨皋一枕三生夢還認青城鄉語知者以為何如錦堂春長闋乃司馬溫公感舊之作全篇云紅日遲遲虛廊轉影槐隂迤邐西斜綵筆工夫難狀晚景煙霞蝶尚不知春去漫繞幽砌尋花奈猛風過後縱有殘紅飛落誰家始知青鬢無價歎飄零宦路荏苒年華今日笙歌叢裏特地咨嗟席上青衫濕透算感舊何止琵琶怎不教人易老多少離愁散在天涯公端徑有守而所賦嫵媚悽婉殆不能忘情豈其少年所作耶古云賢者未能免俗正謂此耳往歲於士人家獲觀錢舜舉畫芙蓉折枝上題行香子一詞豫記其首尾而忘其全且失其名氏後錢畫燬於火詞句常往來于懷惜無從考按也近閲鳬藻集乃知為髙太史季迪所作然豫猶妄意其未盡美蓋其前闋有云鴈來時節寒沁羅裳頗覺少切而後闋云暮栁成行與吳苑池荒等句疑稍牽强也因略為更潤之録似知者如此紅粧不見春光向菊前蓮後才芳秋波向淺寂寞橫塘正一畨風一畨雨一番霜楚江又逺吳江又冷强相依暮栁斜陽蘭舟人去歌韻悠揚但月朧朧雲杳杳水茫茫天籟詞集為白朴太素所作太素號蘭若趙之真定人故金世家也生長兵間流落竄送父子相失遂鞠於父執元遺山所元公教之讀書既長問學宏博後以詩詞顯宋亡恆鬱鬱不樂遂不復求仕以詩酒自放于山水間豫謫倅六安於其裔孫庠生白永盛家獲瞻其遺像酒邊為賦酹江月一詞弔之永盛因出詞集囑豫為登梓宦跡蓬轉未及諧所諾今屏退林下無力復辦此矣感今追昔是不惟孤永盛之託且不肖於此夙昔不淺當復負此老於地下也吊詞云滑稽玩世知胸藏多少春花秋月天籟有詞人有像還是遺山風格松下巢由竹間逸少氣韵真髙潔坐談拊掌溪山等是詩訣見說多景樓前鳳凰臺上醉帽風吹裂千古英豪消歇盡江水至今悲咽九死投荒三年坐困一樣成愁絶寄聲知否酒杯當酹松雪凡白之大略詞頗該之閲天籟集得其數篇録以備詞話之一二奪錦標云霜水明秋霞天送晚畫出江南江北滿目山圍故國三閣餘香六朝陳迹有庭花遺譜慘哀音令人嗟惜想當時天子無愁自古佳人難得惆悵龍沈宫井石上啼痕猶㸃胭脂紅濕去去天荒地老流水無情落花狼籍恨青溪猶在渺重城煙波空碧對西風誰與招魂夢裏行雲消息太素序云奪錦標曲不知始何時世所傳者僧仲殊一篇而巳豫每浩歌尋繹音節因欲效顰恨未得佳趣耳庚辰卜居建康暇日訪古采陳后主張貴妃事以成素志按后主既脫景陽井之厄隋長史髙熲竟戮麗華于青溪後人哀之即其地立小祠祠中塑二女郎次即孔貴嬪也今遺搆荒凉廟貌亦不存矣感歎之餘為作此闋沁園春云獨上遺臺目斷清秋鳳兮不還恨吳宫幽徑埋深花草晉時髙塜銷盡衣冠橫吹聲沈騎鯨人去月滿空江鴈影寒登臨處且摩挲石刻徙倚䦨干青天半落三山更白鷺洲橫一水間問誰能心比秋來水淨漸教身似嶺上雲間擾擾人生紛紛世事就裏何嘗不强顔重回首怕浮雲蔽日不見長安叙云保寧寺即鳳凰臺太白留題在焉宋髙宗南渡嘗駐驆寺中有石刻書王荆公贈僧詩云紛紛擾擾十年間世事何嘗不强顔亦欲心如秋水淨應須身似嶺雲閒意者當時南北擾攘國家蕩析磨盾鞍馬間經營之志百未一遂此詩必有深契于心者故書以自况豫暇日來遊因演太白荆公詩意亦猶稼軒水龍吟用李延年淳于髠語也滿庭芳云雅燕飛觴清談揮麈主人終日留歡密雲雙鳳碾破縷金盤鬬品香泉味好須臾看蟹眼湯翻銀瓶注花浮兔碗雪㸃鷓鴣斑雙鬟微步穩春纎擎露翠袖生寒覺清風扶我醉玊頺山照眼紅紗畫燭吟鞭送月滿銀鞍歸來晚藝窗未寢相對小粧殘序云屢欲作茶詞未暇也近選宋名公樂府黃賀陳三集中凡載滿庭芳四首大概相類亦有得失復雜用無寒刪先韻而語意若不倫僕不愧狂斐合三家竒句試為一首必有能辨之者張靖之有方洲集中載南詞踰二十篇豫細選之得其西湖㑹飲一首然復語意不倫乃為之稍加更潤始若可歌然不謂大佳也念奴嬌云清明天氣歎三分春色二分僝驟蝶意鶯情留戀處還在餘花剩栁風雨相催隂晴不定落得人憔瘦淡粧濃抹西湖却道如舊誰把山色空濛水光瀲灔收拾歸庭牖一笑償他花鳥債又是幾畨開口前輩文章諸公賦咏借問誰曾有浮雲春夢此情都付杯酒豫嘗妄謂我朝文人才士鮮工南詞間有作者病其賦情遣思殊乏圓妙甚則音律失諧又甚則語句塵俗求所謂清楚流麗綺靡醖藉不多見也靖之在國朝亦東南文士冠冕豫選其所作止如此乃知作者之難此道之未易耳瞿宗吉寓姑蘇作入聲甘州以自遣首闋云倚危樓翹首問天公何時故鄉歸對碧雲千里緑波一道山色周圍風景不殊疇昔城郭是耶非滿目新亭淚獨自沾衣其自叙云丙午秋重到姑蘇登樓有作按丙午乃至正二十六年時張士誠尚據姑蘇明年丁未滅亡則是時張之國勢蓋蹙矣初士誠稱吳王不惜美官豐祿以招徠天下之士凡前元不得志者悉投之宗吉薄遊姑蘇豈亦謀祿仕之計耶然宗吉以至正丁亥生屈指至丙午年才弱冠則其再遊姑蘇非必汲汲於營進也特以采采故耳繼此即返掉丁未燕巢之禍脫不預焉其視張思亷等有間矣渚山堂詞話卷三
