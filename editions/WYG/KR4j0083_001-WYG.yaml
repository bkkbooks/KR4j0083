  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0083_WYG_001-1a, image: WYG1494/WYG1494-0532c.png}
body:
  text: 渚山堂詞話巻一明陳霆撰歐公有句云平蕪盡處是春山行人更在春山外陳大聲體之作蝶戀花落句云千里青山勞望眼行人更比青山逺雖面目稍更而意句仍昔然則偷句之鈍何可避也予向作踏莎行末云欲將歸信問行人青山盡處行人少或者謂其襲歐公要之字語雖近而用意則别比與大聲之鈍自謂不侔劉後村作摸魚兒以詠海棠後闋云君試論花共酒古來二字天猶吝年光更迅謾緑葉成陰青苔滿地做取異時恨舊見瞿山陽摸魚兒尾云怕緑葉成陰紅花結子留作異時恨殆全用後村句格或者宗吉誦劉詞久熟不覺用為已語耶不然則連盜數言恐渠亦自知避張安國在沿江帥幕一日預宴賦六州歌頭云長淮望斷闗塞莽然平煙塵暗朔風動俏邊聲黯愁凝追想當年事殆天數非人力洙泗上弦歌地亦羶腥隔水旃鄉落日牛羊下區脫縱横報名王宵獵騎火一川明笳鼔悲鳴遣人驚念腰間箭匣中劒空埃蠧竟何成傷時易失心徒壯歲將零渺渺神京干羽方懐逺靖烽燧且休兵冠葢使紛馳騖若為情聞道中原遺老長南望翠葆霓旌遣行人到此終憤憤氣瞋膺有淚如傾歌罷魏公流涕而起掩袂而入張商英於徽宗朝罷相其去國南鄉子云向晩出京闗細雨微風拂面寒楊栁堤邊青草岸堪觀只在人心咫尺間酒飲盞須乾莫道浮生是等閒用則斡旋天下事何難不用雲中别有山按商英為小官時嘗作嘉禾篇以美司馬君實既而媚事紹聖共倡紹述崇寧間遂執政㑹與蔡京異論言者劾之遂冐入黨籍大觀間作相本以其能與蔡京立異而用之然不久罷迹其為人議論反覆復冒求榮進去元祐諸人逺甚或者乃惜其去而歎其賢蓋流俗不考耳秋晩曲寄謁金門劉伯温作也首云風嫋嫋吹緑一庭秋草為語亦佳然即風乍起吹皺一池春水格耳以二言細較劉公當退避一舍唐莊宗早年甚英果晩乃溺於情慾不勝其宴昵之私嘗見其如夢令云曽宴桃源深洞一曲舞鸞歌鳳酒散别離時殘月落花煙重如夢如夢和淚出門相送詳味詞旨所謂亡國之音哀以思者也奄忽喪敗實䜟於此山谷在涪州嘗送人歸鄉作青玉案云憂能損性休朝暮憶我當年醉時句渡水穿雲心巳許暮年光景小軒南浦簾捲西山雨葢此老舊有句云我自只如常日醉滿川風雨替人愁即此闋所謂醉時句者也西山南浦相期暮年而卒死南服竟不如志嗚呼歸去誠可憐天涯住亦得豈非終身䜟耶少游八六子尾闋云正銷凝黄鸝又啼數聲唐杜牧之一詞其末云正銷魂梧桐又移翠隂秦詞全用杜格然秦首句云倚危亭恨如芳草萋萋剗盡還生二語妙甚故非杜可及也昔人謂凡詩言富貴者不必䂓規然語夫金玉錦綺惟言氣象而富貴自見乃為真知富貴者予謂瞿山陽一曲有之巫山一段雲云扇上乗鸞女屏間跨鶴仙博山香裊水沈煙飛燕蹴筝弦水簟波痕細風車月暈圎銀瓶引綆汲新泉培養並頭蓮貝清江嘗有秋日海棠詞其腔則八六子也後闋云清明時節曽㸔院落早鶯猶困樓臺乳燕初還悵過了韶華一枝偷綻拒霜爭艶斷霞分彩空贏得人自先驚老去天應不放春閒倚䦨干西風别愁幾畨予謂人自先驚老去天應不放春閒二句意思警妙古作中不多見也舊嘗有秋日牡丹句云傾國尚堪迷晚蝶返魂何必藉東風自謂得意然不免涉於形色視清江所搆知落第二楊孟載新栁清平樂云猶寒未煖時光將昏漸曉池塘記取春來楊栁風流全在輕黄狀新栁妙處數句盡之古今人未曽道著歌此闋者想見芳春媚景暝色入簾殘月戒曙身在芳塘之上徘徊容與也唐人所謂最是一年春好處絶勝煙栁滿皇都詩家清景在新春緑栁纔黄半未勻雖諳此風致然特槩言耳東坡咏梅成三十篇其紅梅云詩老不知標格在更看緑葉與青枝謂石曼卿有認桃無緑葉辨杏有青枝之句也胡平仲因用坡句作减字木蘭花令云天然標格不問青枝和緑葉彷彿吳姬酒暈無端上玉肌怕愁貪睡誰㑹傷春無限意乞與徐熙畫出横斜竹外枝夫紅梅與桃杏逈異不待觀枝葉而辨巳明矣予甚愛坡語用特録胡詞貽之好事者楊眉菴落花詞云當時開拆賴東風飄零還是東風妬意甚悽婉又云緑陰深樹覔啼鶯鶯聲更在深深處語意醖藉殆不减宋人也嚴灘釣臺有書水調歌頭一闋或謂朱晦翁所賦然無可考証予輯草堂遺音寘此詞其中姑依舊本定為胡明仲之作後有知者或能是正也至元間有傅按察者嘗作錢塘懐古一長闋蓋咏宋氏之亡也中云下襄樊指揮湘漢鞭雲騎圍繞江干勢不成三時當混一過唐之數不為難陳橋驛孤兒寡婦久假當還王猛以正朔相承在江左臨殁尚阻苻堅南伐之謀豈謂三百年遺黎而有此語也東魯遺黎老子孫南方心事北方身若按察者有愧於信雲父多矣遺老猶應愧蜂蟻故人久矣化豺狼其斯人之謂歟元遺山嘗赴試并州道逢捕生者旦獲一鴈殺之其一脫網然悲鳴不能去竟自投於地而死元因買得之𦵏之汾水之上累石為識復作詞弔之云問人間情是何物直教生死相許天南地北雙飛客老翅幾囘寒暑歡樂趣離别苦是中更有癡兒女君應有語渺萬里層雲千山暮景隻影為誰去横汾路寂寞當年簫鼓荒煙依舊平楚招魂楚些何嗟及山鬼自啼風雨天也妬未信與鶯兒燕子俱黄土千秋萬古為留待騷人狂歌痛飲來訪鴈丘處其腔蓋摸魚兒也是篇既出其地遂名鴈丘云吳履齋潛字毅夫宋狀元及第初其父柔勝仕行朝晩寓予里履齋實生焉曩予作仙潭誌求其制作不可見近偶獲其滿江紅一詞為拈出于此全篇云栁帶榆錢又還過清明寒食天一笑滿園羅綺滿城簫笛花樹得晴紅欲染逺山過雨青如滴問江南池館有誰來江南客烏衣巷今猶昔烏衣事今難覔但年年燕子晩煙斜日抖擻一春塵土倩悲凉萬古英雄迹且芳樽隨分趂芳時休虛擲史稱履齋為人豪邁不肯附權要然則固剛膓者而抖擻悲凉等句似亦類其為人文文山云王昭儀題滿江紅於驛壁為中原士夫傳誦惜其末句少商量耳拘囚之餘漫和一闋庶幾妾薄命之義詞云燕子樓中又睚過幾番秋色相思處青年如夢乗鸞仙闕肌玊暗銷衣帶緩淚珠斜透花鈿側最無端蕉影上窻紗青燈歇曲池合髙臺滅人世事何堪說向南陽阡上滿襟清血舉世便如翻覆手孤身原是分明月歎樂昌一段好風流菱花缺然予又按佩楚軒客語以原詞為張瓊瑛所作題之夷山驛中瓊瑛本昭儀位下也若然則後世可以移責矣苐未審信否耳劉伯温有寫情集皆詞曲也惜其大闋頗窒滯惟小令數首覺有風味故予所選小令獨多然視宋人亦逺矣劉未遇時嘗避難江湖間徃見其水龍吟一闋云雞鳴雨蕭蕭側身天地無劉表啼鵑迸淚落紅飄恨斷魂飛繞月暗雲霄星沈煙水角聲哀裊問登樓王粲鏡中華髪今宵又添多少極目鄉闗何處渺青山雙螺低小幾囘好夢隨風歸去被他遮了寳瑟弦僵玊笙簧冷㝠鴻天杪但侵堦莎草滿庭緑樹不知昏曉此詞當是無聊中作風雨蕭蕭不知昏曉則有感于時代之昏濁而世無劉表登樓王粲則自傷於身世之覊孤然孰知其不得志于前元者乃天特老其材將以貽諸皇明也哉是則適為大幸也岳武穆駐師鄂州紀律嚴明路不拾遺秋毫無犯軍民胥樂古名將莫能加也有邵公序者薄遊江湘道其管内因作滿庭芳贈之云落日旌旗清霜劒㦸塞角聲唤嚴更論兵慷慨齒頰帶風生坐擁貔貅十萬銜枚勇雲槊交横笑談頃匈奴授首千里靜攙搶荆襄人按堵提壺勸酒布榖催耕盡芝夫蕘子歌舞威名好是輕裘緩帶驅營陣絶漠横行功誰紀風神宛轉麟閣畫丹青鄂王遺事云此詞句句縁實非尋常諛詞也渚山堂詞話巻一
