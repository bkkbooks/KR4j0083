body:
  text: 渚山堂詞話詞曲類三詞話之屬提要臣等謹按渚山堂詞話三巻明陳霆撰霆字聲伯徳清人𢎞治壬戌進士官至山西提學僉事是編與所作詩話並刋而較詩話為稍勝盖霆詩格頗纎于詞為近故論詞轉用所長其中如韋莊雨餘風軟碎鳴禽句本用杜荀鶴春宫怨語南卓羯鼓録所謂透空碎逺之聲即此碎字當訓細瑣襍亂之義霆乃謂鳴禽碎于理不通改為暖風嬌鳥碎鳴音未免㸃金成鐡又謂楊孟載雪詞簌簌颺颺古無所出欲據黄庭堅詩改為疎疎密密不知以疎疎密密詠雪黄詩又何所出亦未免涉于膠固然其他持論多確又宋元明佚篇斷句徃徃而有如宋徐一初九日登髙之類其本集不傳于世者亦頗賴以存王昭儀滿江紅詞為其位下宫人張瓊瑛作垂楊玉耳墜金環二曲為唐宋舊譜所無之類亦足資考証猶明人詞話之善本也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cee61083f1a8a91c964b64e60b24d35c92a724c888bf49ea1fd2f24dc54e6ffe
