body:
  text: 渚山堂詞話卷二明陳霆撰聞之前輩朱淑真才色冠一時然所適非偶故形之篇章往往多怨恨之句世因題其藁曰斷腸集大抵佳人命薄自古而然斷腸獨斯人哉古婦人之能詞章者如李易安孫夫人輩皆有集行世淑真繼其後所謂代不乏賢其詞曲頗多豫精選之得四五首咏雪念奴嬌云斜倚東風渾慢慢頃刻也須盈尺巳盡雪之態度繼云擔閣梁吟寂寥楚舞空有獅兒隻復道盡雪事又覺醖藉也咏梅云濕雲不渡溪橋冷嫩寒初破霜風影溪下水聲長一枝和月香别闋云拂拂風前度暗香月色侵花冷梨花云粉淚共宿雨闌珊清夢與寒雲寂寞凡皆清楚流麗有才士所不到而彼顧優然道之是安可易其為婦人語也項斯詠雲有平鋪水不流之句王敬叔以入之菩薩蠻調中全闋云小樓拄頰凝遙睇朝來證得唐人句半嶺白雲浮平鋪水不流明朝還欲雨又向何山去且可宿簷間勞君護夜寒敬叔云向者讀項斯平鋪水不流之句意不謂佳偶雨後望諸峰雲氣方悟其寫景之妙大抵古人語言不可輕詆因作小詞識之垂楊與玉耳墜金環二曲宋唐以前未聞有作近於天籟集中見之然則其所始豈金元之際乎垂楊云關山杜宇任年年唤得韶光歸去怕上髙城望逺煙水迷南浦賣花聲動天街曉總吹入東風庭戶正紗窗濃睡覺來驚翠蛾愁聚一夜狂風橫雨恨西園媚景匆匆難駐試把芳菲㸃檢鶯燕渾無語玉纎空拆梨花撚對寒食懨懨情緒問東君此别經年落花誰是主玉耳墜金環云搖落初冬愛南枝逈絶暖氣潛通含章睡起宫黃褪新粧淡淡丰容氷葩瘦蠟蒂融便自有翛然林下風肯羡狂蜂殢蝶艷紫妖紅何處對花興濃向藏春池館透月簾櫳一枝鄭重天涯信腸斷驛使相逢關山路幾萬重記昨夜筠筒和淚封料馬首幽香先到夢中白太素云壬子冬薄遊順天張侯之兄正卿邀豫往拜夫人既而留飲命撰詞一咏梅以玉耳墜金環歌之一送春以垂楊歌之詞成惠以羅綺四端夫人大名人能道古今雅好賓客自言幼時有老尼年幾八十嘗教以舊曲垂楊音調至今了然事與東坡補洞仙歌詞相類中統建元夀春𣙜場中得南方詞一編有垂楊三首其一乃向所傳者然後知夫人乃承平家世之舊也文文山詞在南宋諸人中特為富麗其書燈屏齊天樂云夜來早得東風信瀟湘一川新緑栁色含晴梅心沁暖春淺千花如束銀蟾乍浴正沙鴈將還海鰲初矗雲擁旌旗笑聲人在畫䦨曲星虹瑶樹縹眇珮環鳴碧落瑞籠華屋露耿銅虬水翻鐵馬簾幕光搖金粟遲遲倚竹更為把瑤樽滿斟醽醁回首宫蓮夜深歸院燭染指一臠則餘可知矣史稱文山性豪侈每食方丈聲妓滿前晚節乃散家資募義勤王九死不奪蓋子房所謂韓亡不愛萬金之資者也真人豪哉瞿宗吉號山陽道人有餘清及樂府遺音等集皆南詞也往見其望西湖十闋其自叙云丁巳歲夏寄居富氏餘清樓俯視西湖如開一鏡凡隂晴風雨寒暑晝夜未嘗不與水光山色相接也技癢不能忍因製望西湖十闋其腔即朝無咎買陂塘舊譜也宗吉工詩詞其所作甚富然豫所取者止十餘闋惜其視宋人風致尚逺辛稼軒詞或議其多用事而缺流便豫觀其琵琶一詞則此論未足慿也賀新郎云鳳尾龍香撥自開元霓裳曲罷幾畨風月最苦潯陽江上路畫舸亭亭催别記出塞黃雲堆雪馬上離愁三萬里認孤鴻沒處分胡越絃解語恨難說遼陽驛使音塵絶瑣窗寒輕挑謾撚淚珠盈睫推手含情還郤手一抹梁州哀徹千古事雲飛烟滅賀老定場無消息悄沈香亭北繁華歇彈到此為嗚咽此篇用事最多然圓轉流麗不為事所使稱是妙手金猊瑞腦噴香霧向曉寒多深閉戶窗明殘雪積飛瓊風起亂雲飄敗絮錦幃細看霓裳舞小玉銀筝學鶯語梅香滿座襲人衣誰道江橋無覔處此陳大聲冬雪詞也寄木蘭花令論者謂其有宋人風致使雜之草堂集中未必可辨也雖然大聲和草堂自豫所選數首外求其近似者蓋少章文莊春日小重山云栁暗花明春事深小䦨紅芍藥巳抽簪雨餘風軟碎鳴禽遲遲日猶帶一分隂語意甚婉約但鳴禽曰碎於理不通殊為語病唐人句云風暖鳥聲碎然則何不曰暖風嬌鳥碎鳴音也崇寧間山谷謫宜州乙酉歲九日登城樓眺望聽邊人相語云今歲當鏖戰取封侯因作南鄉子云諸將說封侯短笛長吹獨倚樓萬事總成風雨去休休戲馬臺南金絡頭催酒莫遲留飲量今秋勝去秋花向老人頭上笑羞羞人不羞花花自羞詞成倚䦨高歌若不能堪是月三十日遂不起楊孟載作禁體雪詞後闋云正簌簌還揚揚復纎纎則於古無所出雖移之别咏未為不可豫謂雪詞既禁體於法宜取古人成語勻之句中使人一覽見雪乃為本色嘗記山谷咏雪有卧聽䟱䟱還密密曉看整整復斜斜之句因輒易之云正疏疏還密密復纎纎知者以為何如江東陳鐸大聲嘗和草堂詩餘幾及其半輒復刋布江湖間論者謂其以一人心力而欲追襲羣賢之華妙徒負不自量之譏蓋前輩和唐音者胥以此故為大方所不許大聲復冒此禁何也然以其酷擬前人故其篇中亦時有佳句四言如嬌雲送馬髙林回鳥逺波低鴈五言如飛夢去江干又添驢背寒饑鳥啄瓊樹寒波淨銀塘香浮殘雪動影弄寒蟾小六言如長日餘花自落無風弱栁還搖楊栁倚風清瘦花枝照水分明明月為誰圎缺浮雲隨意隂晴七言如花蕊暗隨蜂作蜜溪雲還伴鶴歸巢欲將離恨付春江春江又恐東流去千里青山勞望眼行人更比青山逺秋水無㾗涵上下浮雲有意遮西北散句如東風路多少小燕閒庭亂鶯芳樹綵雲盡逐東風散惟有花陰層壘九十韶光自不容何必憎風雨暮山髙下暮雲平行人不渡只有斷橋橫清溪流水斜橋淡月不減山隂好春城晚霏霏滿湖煙雨斷腸無奈落花飛絮凡此頗婉約清麗使其用為已調當必擅聲一時而以之追步古作遂蹈村婦鬬美毛施之失蓋不善用其長者也僧仲殊好作艷詞其同袍孚草堂者嘗寓詩針之迄不為止殊嘗咏婦人有鳳鞋濕透立多時不言不語厭厭地之句後殊經于枇杷樹下輕薄子更其句以弔云枇杷樹下立多時不言不語厭厭地聞者捧腹大率淫言媟語故非衲子所宜也然殊諸曲類能脫絶寒儉之態如南歌子云白露收殘月清風散曉霞訴衷情云紅船滿湖歌吹花外有髙樓念奴嬌云竹影篩金泉潄玉紅映薇花簾幕又别闋云絳綵嬌春鉛華掩晝占斷鴛鴦浦此等句何害其為富冶也殊有寶月集行于世徐一初者不知何許人其九日登髙一詞殊亦可念初云參軍莫道無勳業消得從容樽爼君看取便破帽飄零也得名千古復云登臨莫上髙層望怕見故宫禾黍觴緑醑澆萬斛牢愁淚閣新亭雨黃花無語畢竟仗西風朝來披拂猶識舊時主詞意甚感慨不平參軍自况之意豈非德祐時忠賢位不滿其才者耶故宫禾黍無語黃花則又有感於天翻地覆之事蓋谷音之同悲者也聚景園有故宋宫人殯宫瞿宗吉嘗作木蘭花慢云記前朝舊事曽此地㑹神仙向月地雲階閒攜翠袖來拾花鈿繁華總隨流水歎一場春夢杳難圓廢港芙蕖滴露斷堤楊栁搖煙兩峯南北只依然輦路草芊芊悵波冷山空翠銷鳳蓋紅沒龍船平生銀屏金屋黯漆燈無焰夜如年落日牛羊壠上西風燕雀林邊瞿詞雖多豫所賞愛者此闋維最然瞿有咏金故宫白蓮詞即用此腔而語意亦仍之首云問前朝舊事曽此地㑹神仙即此起句也是知此詞為瞿得意者故疊用如此文丞相既敗元人獲置舟中既而挾之蹈海崖山既平復踰嶺而北道江右作酹江月二篇以别友人皆用東坡赤壁韻其曰還障天東半壁曰地靈尚有人傑曰恨東風不借世間英物曰只有丹心難滅其於興復未嘗不耿耿也宋理宗朝有武人李好義者頗善詞章嘗見其春暮作謁金門云花著雨又是一畨紅素燕子歸來愁不語故巢無覔處誰在玊樓歌舞誰在玉關辛苦若使胡塵吹得去東風侯萬戶玉樓歌舞數句語意不平豈非當時擅國者宴樂湖山而不恤邊功故耶然則宋之淪亡故非一日之故矣張士誠據姑蘇凡髙門大宅悉為其權幸所占計其一時歌鐘甲第之富輿馬姬妾之盛自謂安享樂成永永無慮孰知不五六年煙滅雲散如髙季迪之木蘭花慢所慨是也髙詞云笑匆匆夢短人間事幾黃粱早月墜箏樓塵生㦸戶草滿毬場美人盡為黃土甚溫柔難把作仙鄉桃李一畨狼籍燕鶯幾許凄凉虛言地久與天長滄海變耕桑記花月當年儘多歡樂却少思量門前久無繫馬但棲鴉臨晚占垂楊試問今來過客有誰感歎斜陽蓋盛衰不常物理反復雖貴侯世戚且不能保其盈滿况於一時草竊者哉此足為陸梁者之戒李世英蝶戀花句云朦朧淡月雲來去歐公蝶戀花句云珠簾夜夜朦朧月二語一律不知者疑歐出李下豫細較之狀夜景則李為髙妙道幽怨則歐為醖藉蓋各適其趣各擅其極殆未易優劣也歐公舊有春日詞云緑楊樓外出秋千前輩歎賞謂只一出字是人著力道不到處他日咏秋千作浣溪沙云雲曳香綿綵柱髙絳旗風颭出花梢豫謂雖同用出字然視前句其風致大段不侔豫性樂閒退平生宦歷遇林壑美處輒飄然起掛冠之興憶曩昔董學太原或日秋仲西風颯然木葉飄落而目送飛鴻聲墮層漢間不覺感陶令張翰事作滿江紅云歸去來兮懷歸意幾人知得尋思起前年江海去年京國奔走隙駒春夢路飄零海燕秋風客念家山松徑久荒蕪疏三益風流散音塵沒身世在江山隔遣何人杏花影裏月明吹笛紅雨等閒花事盡青銅容易霜華入被鴈聲報到塞門秋聽嘹嚦既後督視至徐溝縣夜坐有感復次前韻書院壁云歸去來兮青山好欲歸便得人世事風前燈焰夢中槐國驛馬出門塵土路舫齊聽雨江湖客把十年忙冗换清閒嗟何益太行嶺孤雲沒江南夢重山隔有何人五湖煙棹洞庭霜笛寶劍醉看豪氣在銀屏晚怯秋風入向中宵無意更聞雞空咿嚦是嵗冬豫以心疚移疾卧齊中既踰月朝旨竟下許還籍致仕蓋事兆之應去作詞之月日無幾咄咄真怪事哉花朝曲古作者多矣豫見楊孟載一闋云鸞股先尋鬬草叉鳳頭新繡踏青鞋衣裳宫樣不須裁雕玊壘成鸚鵡架泥金鐫就牡丹牌明朝相約看花來此詞造語雖富麗然正宋人所謂看人富貴者耳未必知富貴也如溫飛卿籠中嬌鳥暖猶睡門外落花閒不掃王隨一聲啼鳥禁門寂滿地落花春晝長則真富貴氣象金完顔亮頗能詞章嘗作昭君怨雪詞云昨日樵村漁浦今日瓊林玉渚山色捲簾看老峰巒錦帳美人貪睡不覺天花剪水驚問是楊花是蘆花亮之他作例倔强怪誕殊有桀驁不在人下之氣此詞稍和平竒俊特為録之劉伯溫寓金陵嘗秋夜作摸魚兒云正凄涼月明孤館那堪征鴈嘹唳不知衰鬢能多少還共栁絲同悴朱戶閉有瑟瑟蕭蕭落葉鳴莎砌斷魂不繫又何必殷勤啼螿絡緯相伴夜迢遞漁樵事天也和人較計虛名枉誤身世流年滚滚長江逝回首碧雲無際空引睇但滿眼芙蓉黃菊傷心麗風吹露洗寂寞舊南朝慿䦨懷古零淚在衣袂公在金陵正得君行志之秋而詞意傷感如此殆不可曉豈所謂謝安雖受朝寄而東山之志雅意不忘者耶然詳觀首尾又似未嘗得遇者竟不知或在未徴召之前否也僧如晦作春歸云有意送春歸無計留春住畢竟年年用著來何似休歸去目斷楚天遙不見春歸路風急桃花也似愁㸃㸃飛紅雨瞿宗吉一曲云雙蝶送春來雙燕銜春去春去春來總屬人誰與春為主一陳雨催花一陳風吹絮惟有啼鵑更迫春不放從容住二詞皆咏春歸皆寄卜算子然比而觀之如晦則意髙妙宗吉則語清峭殆不相伯仲也煙草萋萋小樓西雲壓鴈聲低春山碧樹秋重緑人在武陵溪劉伯溫秋晚曲也雲壓鴈聲低與春山碧樹秋重緑二語動人或謂未經前人道破以豫所見亦轉换雲開鴈路長與春草秋更緑耳南唐書云盧絳少夢一白衣婦人姿甚美勸絳巵酒而歌菩薩蠻云玊京人去秋蕭索畫簷鵲起梧桐落欹枕悄無言月和清夢圓背燈惟暗泣甚處砧聲急眉黛小山攢芭蕉生暮寒歌畢謂絳曰他日相見于固子陂下絳後仕南唐國亡起義乃殺歙守龔儀既后歸宋㑹儀猶子穎求復季父之讐乃命斬于固子陂下同時一白衣婦人以淫亂被斬儼然夢中人也姓耿名玉真前夢中巳嘗通名矣事雖怪而詞則佳乃録之渚山堂詞話卷二
