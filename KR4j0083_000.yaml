body:
  text: 渚山堂詞話詞曲類三詞話之屬提要臣等謹按渚山堂詞話三卷明陳霆撰霆字聲伯德清人𢎞治壬戌進士官至山西提學僉事是編與所作詩話並刋而較詩話為稍勝蓋霆詩格頗纎于詞為近故論詞轉用所長其中如韋莊雨餘風軟碎鳴禽句本用杜荀鶴春宫怨語南卓羯鼓録所謂透空碎逺之聲即此碎字當訓細瑣雜亂之義霆乃謂鳴禽碎于理不通改為暖風嬌鳥碎鳴音未免㸃金成鐡又謂楊孟載雪詞簌簌揚揚古無所出欲據黃庭堅詩改為疏疏密密不知以疏疏密密詠雪黃詩又何所出亦未免涉于膠固然其他持論多確又宋元明佚篇斷句往往而有如宋徐一初九日登髙之類其本集不傳于世者亦頗賴以存王昭儀滿江紅詞為其位下宫人張瓊瑛作垂楊玉耳墜金環二曲為唐宋舊譜所無之類亦足資考證猶明人詞話之善本也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:54f9378875080c0f75d6b947090f6fbf6539d6ccb89eb60c856f2dbe7a122696
